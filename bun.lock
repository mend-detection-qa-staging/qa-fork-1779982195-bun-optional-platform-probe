// Bun lockfile — text JSONC format (Bun 1.2+).
// Generated for probe: bun-optional-platform-probe.
// Pattern: optional-platform-deps.
// All platform variants of esbuild are listed in optionalDependencies.
// At install time Bun only downloads the variant matching the host OS/CPU.
// At scan time Mend MUST report ALL variants regardless of the scan host platform.
// Comments and trailing commas are valid JSONC — a JSONC-tolerant parser is required.
{
  "lockfileVersion": 1,

  // workspaces: root-only project (no monorepo members).
  // esbuild is a direct dep; the @esbuild/* platform packages are
  // declared in optionalDependencies alongside esbuild itself.
  // esbuild@0.19.12's own optionalDependencies field (in its package.json
  // on the registry) also lists every platform variant — so the platform
  // packages appear BOTH as root-level optionalDependencies in this manifest
  // AND as transitive optionalDependencies of esbuild itself.
  "workspaces": {
    "": {
      "name": "bun-optional-platform-probe",
      "dependencies": {
        "esbuild": "^0.19.12",
      },
      "optionalDependencies": {
        "@esbuild/darwin-arm64": "0.19.12",
        "@esbuild/darwin-x64": "0.19.12",
        "@esbuild/linux-x64": "0.19.12",
        "@esbuild/win32-x64": "0.19.12",
      },
    },
  },

  // packages: resolved registry entries.
  // Tuple format: ["name@version", { metadata }, "integrity-hash"]
  "packages": {

    // ── Direct dependency (group: main) ──────────────────────────────────────
    // esbuild@0.19.12: the canonical esbuild package. It ships no JS at
    // runtime — it is a thin wrapper that delegates to the platform binary
    // subpackage. Its own optionalDependencies list every @esbuild/* variant;
    // those are also hoisted to the root optionalDependencies in this manifest.
    "esbuild": ["esbuild@0.19.12", {
      "optionalDependencies": {
        "@esbuild/android-arm": "0.19.12",
        "@esbuild/android-arm64": "0.19.12",
        "@esbuild/android-x64": "0.19.12",
        "@esbuild/darwin-arm64": "0.19.12",
        "@esbuild/darwin-x64": "0.19.12",
        "@esbuild/freebsd-arm64": "0.19.12",
        "@esbuild/freebsd-x64": "0.19.12",
        "@esbuild/linux-arm": "0.19.12",
        "@esbuild/linux-arm64": "0.19.12",
        "@esbuild/linux-ia32": "0.19.12",
        "@esbuild/linux-loong64": "0.19.12",
        "@esbuild/linux-mips64el": "0.19.12",
        "@esbuild/linux-ppc64": "0.19.12",
        "@esbuild/linux-riscv64": "0.19.12",
        "@esbuild/linux-s390x": "0.19.12",
        "@esbuild/linux-x64": "0.19.12",
        "@esbuild/netbsd-x64": "0.19.12",
        "@esbuild/openbsd-x64": "0.19.12",
        "@esbuild/sunos-x64": "0.19.12",
        "@esbuild/win32-arm64": "0.19.12",
        "@esbuild/win32-ia32": "0.19.12",
        "@esbuild/win32-x64": "0.19.12",
      },
    }, "sha512-aARqgq8roFBj054KvQr5f1sFu0D65G+miZRCuJyJ0G13Zwx7vRar5Zhn2tkQNzIXcBrNVsv/8stehpj+GAjgbg=="],

    // ── Platform-specific optional binary subpackages ─────────────────────────
    // Each subpackage ships a native binary for one OS/CPU combination.
    // The `os` and `cpu` fields come from the package's own package.json
    // on the npm registry. Bun records them here in the lockfile so the
    // install step can skip non-matching variants without fetching their
    // tarballs. Mend's static parser must preserve ALL four variants
    // regardless of which platform runs the scan.

    // Linux x64 variant — the most common CI/scanner host.
    // A scanner running on Linux x64 will INSTALL this variant.
    // The three remaining variants MUST still appear in Mend's output.
    "@esbuild/linux-x64": ["@esbuild/linux-x64@0.19.12", {
      "os": "linux",
      "cpu": "x64",
    }, "sha512-B71g1QpxfwBvNrfyJdVDexenDIt1CiDN1TIXLbhOw0KhJzE78KIFGX6OJ9MrtC0oOqMWf+0xop4qEU8JrJTwCg=="],

    // macOS Apple Silicon (arm64) variant.
    // Matches hosts running macOS on M1/M2/M3 chips.
    "@esbuild/darwin-arm64": ["@esbuild/darwin-arm64@0.19.12", {
      "os": "darwin",
      "cpu": "arm64",
    }, "sha512-B6IeSgZgtEzGC42jsI+YYu9Z3HKRxp8ZT3cqhvliEHovq8HSX2YX8lNocDn79gCKJXOSaEot9MVYky7AKjCs8g=="],

    // macOS Intel (x64) variant.
    // Matches hosts running macOS on Intel chips.
    "@esbuild/darwin-x64": ["@esbuild/darwin-x64@0.19.12", {
      "os": "darwin",
      "cpu": "x64",
    }, "sha512-hKoVkKzFiToTgn+41qGhsUJXFlIjxI/jSYeZf3ugemDYZldIXIxhvwN6erJGlX4t5h417iFuheZ7l+YVn05N3A=="],

    // Windows x64 variant.
    // Matches hosts running Windows on amd64 (the dominant Windows CI arch).
    "@esbuild/win32-x64": ["@esbuild/win32-x64@0.19.12", {
      "os": "win32",
      "cpu": "x64",
    }, "sha512-T1QyPSDCyMXaO3pzBkF96E8xMkiRYbUEZADd29SyPGabqxMViNoii+NcK7eWJAEoU6RZyEm5lVSIjTmcdoB9HA=="],

  },
}
